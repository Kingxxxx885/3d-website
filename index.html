<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Animation</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f172a;
  color: #22c55e;
  font-family: monospace;
}

h1 {
  font-size: 2.2em;
  border-right: 3px solid #22c55e;
  padding-right: 5px;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>

<body>

<h1 id="typing"></h1>

<script>
let text = "Gerardo P. De Vera Jr.";
let index = 0;
let speed = 100;

function typeEffect() {
  if (index < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeEffect, speed);
  }
}

typeEffect();
</script>

</body>
</html>
