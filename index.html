<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerardo's Cyber-Dino</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00c1;
            --neon-green: #39ff14;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #020617;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            color: white;
            transition: background 1s ease;
        }

        #game-container {
            position: relative;
            width: 95%;
            max-width: 800px;
            height: 300px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        #ui-layer {
            position: absolute;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 10;
        }

        .score-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* LEVEL UP NOTIFICATION */
        #level-up {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 20%;
            font-size: 2rem;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
            display: none;
            z-index: 15;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
            background: rgba(2, 6, 23, 0.95);
            padding: 30px;
            border: 3px solid var(--neon-pink);
            border-radius: 20px;
            box-shadow: 0 0 50px var(--neon-pink);
        }

        #restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--neon-blue);
            border: none;
            color: #020617;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        #restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        canvas { display: block; }
        
        .hint { margin-top: 15px; color: #475569; font-style: italic; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="score-box">BEST: <span id="hi-score">0</span></div>
            <div class="score-box">SCORE: <span id="score">0</span></div>
        </div>

        <div id="level-up">LEVEL UP!</div>

        <div id="game-over">
            <h1 style="color: var(--neon-pink); margin: 0;">SYSTEM OVERLOAD</h1>
            <p style="font-size: 1.5rem;">SCORE: <span id="final-score">0</span></p>
            <button id="restart-btn">REBOOT ENGINE</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <p class="hint">Tap Screen or Space to Jump</p>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hiScoreEl = document.getElementById('hi-score');
    const gameOverEl = document.getElementById('game-over');
    const levelUpEl = document.getElementById('level-up');
    const finalScoreEl = document.getElementById('final-score');
    const restartBtn = document.getElementById('restart-btn');

    function resize() {
        canvas.width = document.getElementById('game-container').clientWidth;
        canvas.height = 300;
    }
    window.onresize = resize;
    resize();

    let gravity = 0.7;
    let jumpForce = -13;
    let score = 0;
    let hiScore = 0;
    let isGameOver = false;
    let obstacles = [];
    let gameSpeed = 7;
    let level = 1;

    let dino = { x: 50, y: 0, w: 50, h: 50, dy: 0, jump: false, emoji: "🦖" };

    function spawnObstacle() {
        if(isGameOver) return;
        const types = [
            { e: "🌵", c: "#39ff14" },
            { e: "⚡", c: "#fff01f" },
            { e: "🛸", c: "#00f2ff" },
            { e: "💀", c: "#ff00c1" }
        ];
        const t = types[Math.floor(Math.random() * types.length)];
        obstacles.push({ x: canvas.width, y: canvas.height - 65, w: 45, h: 45, emoji: t.e, color: t.c });
    }

    function init() {
        dino.y = canvas.height - dino.h - 10;
        dino.dy = 0;
        obstacles = [];
        score = 0;
        level = 1;
        gameSpeed = 7;
        isGameOver = false;
        gameOverEl.style.display = "none";
        document.body.style.background = "#020617";
        animate();
    }

    function checkLevelUp() {
        if (score > 0 && score % 10 === 0) {
            level++;
            gameSpeed += 1;
            levelUpEl.style.display = "block";
            setTimeout(() => { levelUpEl.style.display = "none"; }, 1000);
            
            // Visual Level Up Effect
            const colors = ["#020617", "#1e1b4b", "#312e81", "#1e293b"];
            document.body.style.background = colors[level % colors.length];
        }
    }

    function animate() {
        if (isGameOver) return;
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground Neon Line
        ctx.shadowBlur = 10;
        ctx.shadowColor = "cyan";
        ctx.strokeStyle = "cyan";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 10);
        ctx.lineTo(canvas.width, canvas.height - 10);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Dino Physics
        if (dino.jump) {
            dino.dy += gravity;
            dino.y += dino.dy;
        }
        if (dino.y + dino.h > canvas.height - 10) {
            dino.y = canvas.height - dino.h - 10;
            dino.dy = 0;
            dino.jump = false;
        }

        ctx.font = "45px serif";
        ctx.fillText(dino.emoji, dino.x, dino.y + 42);

        if (Math.random() < 0.012) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            ctx.font = "40px serif";
            ctx.shadowBlur = 15;
            ctx.shadowColor = obs.color;
            ctx.fillText(obs.emoji, obs.x, obs.y + 40);
            ctx.shadowBlur = 0;

            // Hitbox check
            if (dino.x < obs.x + obs.w - 15 && dino.x + dino.w - 15 > obs.x &&
                dino.y < obs.y + obs.h - 5 && dino.y + dino.h > obs.y + 5) {
                isGameOver = true;
                endGame();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(index, 1);
                score++;
                scoreEl.innerText = score;
                checkLevelUp();
            }
        });
    }

    function endGame() {
        gameOverEl.style.display = "block";
        finalScoreEl.innerText = score;
        if (score > hiScore) {
            hiScore = score;
            hiScoreEl.innerText = hiScore;
        }
    }

    function handleAction(e) {
        if (e.type === 'keydown' && e.code !== 'Space') return;
        if (!dino.jump && !isGameOver) {
            dino.dy = jumpForce;
            dino.jump = true;
        }
    }

    window.addEventListener('keydown', handleAction);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(e); });
    restartBtn.addEventListener('click', init);

    init();
</script>
</body>
</html>
