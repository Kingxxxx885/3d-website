<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerardo Sama | Portfolio Intro</title>
    <style>
        :root {
            --primary-glow: #22c55e;
            --secondary-glow: #3b82f6;
            --accent-glow: #9333ea;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* CINEMATIC BACKGROUND EFFECTS */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
        }

        /* DRAGON KAIJU ANIMATION */
        .dragon-container {
            position: absolute;
            width: 600px;
            height: 600px;
            opacity: 0.4;
            filter: drop-shadow(0 0 30px var(--secondary-glow));
            animation: float 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-40px) rotate(2deg); }
        }

        /* TYPING TEXT STYLE */
        .text-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--secondary-glow), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        #cursor {
            display: inline-block;
            width: 3px;
            height: 3.5rem;
            background-color: var(--secondary-glow);
            margin-left: 5px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* SUBTITLE */
        .subtitle {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0;
            animation: fadeIn 3s forwards 1s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="dragon-container">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M20,100 Q50,20 100,100 T180,100" stroke="cyan" stroke-width="2" fill="none" opacity="0.8">
                <animate attributeName="d" values="M20,100 Q50,20 100,100 T180,100; M20,100 Q50,180 100,100 T180,100; M20,100 Q50,20 100,100 T180,100" dur="10s" repeatCount="indefinite" />
            </path>
            <circle cx="100" cy="100" r="40" stroke="purple" stroke-width="1" fill="none" stroke-dasharray="5,5">
                <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite" />
            </circle>
        </svg>
    </div>

    <div class="text-wrapper">
        <h1 id="typing"></h1><span id="cursor"></span>
        <div class="subtitle">Future Software Engineer</div>
    </div>

    <script>
        const nameText = "Gerardo P. De Vera Jr.";
        const typingElement = document.getElementById("typing");
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 150;

        function playTyping() {
            const currentDisplay = nameText.substring(0, charIndex);
            typingElement.textContent = currentDisplay;

            if (!isDeleting && charIndex < nameText.length) {
                charIndex++;
                typeSpeed = 150; // Normal typing speed
            } else if (isDeleting && charIndex > 0) {
                charIndex--;
                typeSpeed = 75; // Faster deleting
            } else {
                isDeleting = !isDeleting;
                typeSpeed = 2000; // Pause at the ends
            }

            setTimeout(playTyping, typeSpeed);
        }

        // Start the effect
        window.onload = playTyping;
    </script>
</body>
</html>
