<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Color Run</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0; /* Light gray background */
            font-family: 'Courier New', Courier, monospace; /* Classic game font */
            overflow: hidden; /* Prevent scrolling */
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
            background-color: #f7f7f7; /* Slightly darker gray for game area */
            border: 2px solid #535353; /* Dark gray border */
            overflow: hidden; /* Clip game elements within bounds */
        }

        canvas {
            display: block; /* Remove any default margins/padding */
        }

        #score-container {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            color: #535353;
            font-weight: bold;
        }

        #game-over-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none; /* Initially hidden */
        }

        #game-over-message h1 {
            font-size: 40px;
            color: #d9534f; /* Reddish color for Game Over */
            margin-bottom: 10px;
        }

        #game-over-message p {
            font-size: 18px;
            color: #535353;
        }

        #restart-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #5cb85c; /* Green for restart */
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-container">Score: <span id="score">0</span></div>
    <div id="game-over-message">
        <h1>GAME OVER</h1>
        <p>Your Final Score: <span id="final-score">0</span></p>
        <button id="restart-button">Restart</button>
    </div>
    <canvas id="gameCanvas" width="800" height="250"></canvas>
</div>

<script>
    // Game constants and variables
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const gameOverMessage = document.getElementById('game-over-message');
    const finalScoreElement = document.getElementById('final-score');
    const restartButton = document.getElementById('restart-button');

    const GRAVITY = 0.8;
    const JUMP_FORCE = -15;
    const GROUND_HEIGHT = 20;
    const GAME_SPEED = 5;

    let dino = {
        x: 50,
        y: canvas.height - GROUND_HEIGHT - 50, // Initial position, adjusting for ground
        width: 44, // Dino dimensions (can be adjusted)
        height: 47,
        velocityY: 0,
        isJumping: false,
        color: '#ff6347' // Tomato color for dino
    };

    let obstacles = [];
    let score = 0;
    let isGameOver = false;
    let gameLoopId;

    // Obstacle types and properties
    const obstacleTypes = [
        { width: 25, height: 50, color: '#4682b4', type: 'cactus' }, // SteelBlue
        { width: 50, height: 35, color: '#32cd32', type: 'low-obstacle' }, // LimeGreen
        { width: 40, height: 40, color: '#ba55d3', type: 'mid-obstacle' } // MediumOrchid
    ];

    function startGame() {
        dino.y = canvas.height - GROUND_HEIGHT - dino.height;
        dino.velocityY = 0;
        dino.isJumping = false;
        obstacles = [];
        score = 0;
        isGameOver = false;
        scoreElement.innerText = score;
        gameOverMessage.style.display = 'none';
        
        // Input handling
        document.addEventListener('keydown', handleInput);
        document.addEventListener('touchstart', handleInput); // Support mobile tap

        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function handleInput(e) {
        // Jump on Spacebar, Up Arrow, or Touch screen
        if (!isGameOver && (e.code === 'Space' || e.code === 'ArrowUp' || e.type === 'touchstart')) {
            if (!dino.isJumping) {
                dino.velocityY = JUMP_FORCE;
                dino.isJumping = true;
            }
            // Prevent default behavior (like page scroll)
            if(e.code) e.preventDefault();
        }
    }

    function gameLoop() {
        if (isGameOver) return;

        update();
        draw();

        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function update() {
        // Update Dino mechanics
        dino.velocityY += GRAVITY;
        dino.y += dino.velocityY;

        // Ground collision
        const groundY = canvas.height - GROUND_HEIGHT - dino.height;
        if (dino.y > groundY) {
            dino.y = groundY;
            dino.velocityY = 0;
            dino.isJumping = false;
        }

        // Generate obstacles sporadically
        if (Math.random() < 0.015 && obstacles.length < 3) {
            generateObstacle();
        }

        // Update and check for obstacle collisions
        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.x -= GAME_SPEED;

            // Collision detection
            if (checkCollision(dino, obs)) {
                endGame();
                return; // Stop further updates
            }

            // Remove off-screen obstacles and increase score
            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
                i--; // Adjust index after removal
                score++;
                scoreElement.innerText = score;
            }
        }
    }

    function draw() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw ground line
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - GROUND_HEIGHT);
        ctx.lineTo(canvas.width, canvas.height - GROUND_HEIGHT);
        ctx.strokeStyle = '#535353';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw Dino (as a simple colored rectangle)
        ctx.fillStyle = dino.color;
        ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

        // Draw Obstacles (as simple colored rectangles)
        for (let obs of obstacles) {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }
    }

    function generateObstacle() {
        // Randomly select an obstacle type
        const typeIndex = Math.floor(Math.random() * obstacleTypes.length);
        const obstacleType = obstacleTypes[typeIndex];

        let obstacle = {
            x: canvas.width,
            y: canvas.height - GROUND_HEIGHT - obstacleType.height,
            width: obstacleType.width,
            height: obstacleType.height,
            color: obstacleType.color
        };
        obstacles.push(obstacle);
    }

    // AABB Collision Detection
    function checkCollision(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.width &&
            rect1.x + rect1.width > rect2.x &&
            rect1.y < rect2.y + rect2.height &&
            rect1.y + rect1.height > rect2.y
        );
    }

    function endGame() {
        isGameOver = true;
        cancelAnimationFrame(gameLoopId);
        finalScoreElement.innerText = score;
        gameOverMessage.style.display = 'block';
        
        // Remove event listeners when game ends
        document.removeEventListener('keydown', handleInput);
        document.removeEventListener('touchstart', handleInput);
    }

    restartButton.addEventListener('click', startGame);

    // Initial game start
    startGame();

</script>

</body>
</html>
